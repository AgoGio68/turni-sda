<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SDA Turni - Demo Split-Screen</title>
  <style>
    :root {
      --bg-color: #0b0f19;
      --border-glass: rgba(255, 255, 255, 0.1);
      --text-main: #f1f5f9;
      --text-muted: #94a3b8;
      --primary-neon: #3b82f6; 
      --neon-green: #39ff14; 
      --neon-orange: #ff9900;
    }
    
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    
    header {
      background: rgba(20, 30, 48, 0.6);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border-glass);
      padding: 0.75rem 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 10;
    }
    
    h1 {
      margin: 0;
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 0.5px;
      background: linear-gradient(90deg, #00f2fe, #4facfe);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    
    .demo-info {
      font-size: 0.8rem;
      color: var(--neon-orange);
      background: rgba(255, 153, 0, 0.1);
      border: 1px solid rgba(255, 153, 0, 0.3);
      padding: 4px 12px;
      border-radius: 20px;
      font-weight: 600;
    }
    
    .split-container {
      flex: 1;
      display: flex;
      width: 100%;
      height: calc(100vh - 50px);
    }
    
    .view-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      position: relative;
    }
    
    .view-panel:first-child {
      border-right: 1px solid var(--border-glass);
    }
    
    .panel-header {
      padding: 0.5rem 1rem;
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    
    .vol-header {
      background: rgba(59, 130, 246, 0.08);
      color: #00f2fe;
      border-bottom: 1px solid rgba(59, 130, 246, 0.15);
    }
    
    .admin-header {
      background: rgba(57, 255, 20, 0.05);
      color: var(--neon-green);
      border-bottom: 1px solid rgba(57, 255, 20, 0.15);
    }
    
    iframe {
      flex: 1;
      border: none;
      width: 100%;
      height: 100%;
      background: var(--bg-color);
    }
  </style>
</head>
<body>
  <header>
    <h1>🚑 SDA Turni &mdash; Split-Screen Demo</h1>
    <div class="demo-info">💡 Info: Accedi con un account Admin per vedere la sincronizzazione in tempo reale!</div>
  </header>
  
  <div class="split-container">
    <div class="view-panel">
      <div class="panel-header vol-header">👤 Vista Volontario (Sinistra)</div>
      <iframe src="vista_volontario.html" name="volontario_frame"></iframe>
    </div>
    <div class="view-panel">
      <div class="panel-header admin-header">⚙️ Vista Responsabile / Admin (Destra)</div>
      <iframe src="vista_responsabile.html" name="responsabile_frame"></iframe>
    </div>
  </div>
</body>
</html>
